<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>
  <!-- Rounded elegant background -->
  <rect width="512" height="512" rx="128" fill="#0A0A0A" />
  
  <!-- Subtle inner gradient ring -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#gradient)" stroke-width="8" opacity="0.4" />
  
  <!-- Centered abstract holographic shield/vault graphic -->
  <g transform="translate(128, 128)">
    <path d="M128 32 L208 72 L208 152 C208 208 128 240 128 240 C128 240 48 208 48 152 L48 72 Z" fill="url(#gradient)" opacity="0.9" />
    <path d="M128 56 L184 88 L184 144 C184 184 128 212 128 212 C128 212 72 184 72 144 L72 88 Z" fill="#0A0A0A" />
    
    <!-- Central Keyhole/Lock design -->
    <circle cx="128" cy="116" r="20" fill="url(#gradient)" />
    <polygon points="120,128 136,128 140,164 116,164" fill="url(#gradient)" />
  </g>
</svg>
